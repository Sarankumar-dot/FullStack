<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .light{
            background-color: wheat;
        }

        .dark{
            background-color: rgb(49, 39, 39);
        }
    </style>
</head>
<body>
    <!-- here what we are going to do is change theme of body using class name -->
     <!-- classList is a property of an HTML element that gives you a way to add, remove, or check CSS classes using JavaScript. -->

    <button id="but">dark theme</button>

    <script>
        let butt = document.getElementById("but");

        butt.addEventListener('click' , (()=>{
            document.body.classList.remove("light")
            document.body.classList.add("dark")
           

            let white = document.createElement("button");
            white.innerText = "light theme"
            white.addEventListener('click',()=>{
                document.body.classList.remove("dark");
                document.body.classList.add("light");
                

            })

            document.body.appendChild(white);
        }))
        
        
    </script>
</body>
</html>
