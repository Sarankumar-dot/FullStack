<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <div id="di" data-info="this is some information"></div>
    <!-- we can get the data-info by using js by -->

    <script>
        let element = document.getElementById("di");

        // getting attributes
        console.log(element.getAttribute("data-info"));

        // or else we can use
        console.log(element.id);
        
    </script>
</body>
</html>
