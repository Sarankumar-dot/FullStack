<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="parent">
        <p>this is p1</p>
        <p>this is p2</p>
        <p>this is p3</p>
    </div>

    <script>
        const parent = document.getElementById("parent");
        const child = parent.children; // we have to use children to get the child elements
        console.log(child); // returns a html collection

        setTimeout(()=>{
            for(let i = 0;i<child.length;i++){
            const element = child[i];
            element.style.color = "red";
            }
        },1000)
        
    </script>
</body>
</html>
