<!DOCTYPE html>
<!-- Declares the document type as HTML5 -->

<html>
<!-- Root element of the HTML page -->

<head>
  <!-- Contains page information (not visible on the page) -->

  <title>Practice</title>
  <!-- Title shown on the browser tab -->

</head>

<body>
<!-- All visible content goes inside the body -->

<header>
  <!-- Header section of the website (top part) -->

  <h1>My Website</h1>
  <!-- Main heading of the website -->

</header>

<nav>
  <!-- Navigation section for menu links -->

  <a href="#">Home</a>
  <!-- Link to Home page (# means placeholder) -->

  <a href="#">About</a>
  <!-- Link to About page -->

</nav>

<section style="background-color: aqua;">
  <!-- Main content section -->

  <article>
    <!-- Independent piece of content -->

    <h2>Article Title</h2>
    <!-- Article heading -->

    <p>This is content.</p>
    <!-- Paragraph inside the article -->

  </article>
</section>



<footer style="background-color: purple;">
  <!-- Footer section (bottom of the website) -->

  <p>&copy; 2026</p>
  <!-- Copyright symbol using HTML entity -->

</footer>

</body>
<!-- End of visible page content -->

</html>
<!-- End of HTML document -->
