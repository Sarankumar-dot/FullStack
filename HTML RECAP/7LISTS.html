<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lists</title>
</head>
<body>
    <h4>unordered list</h4>
    <ul style="list-style-type:disc;">
        <li>bread</li>
        <li>cheese</li>
        <li>tomato
            <!-- nested lists -->
             <ul style="list-style-type: square;">
                <li>green tomato</li>
                <li>bad tomato</li>
                <li>good tomato</li>
             </ul>
        </li>
    </ul>

    <h4>ordered list</h4>
    <ol type="I" >
        <li>saran</li>
        <li>irfan</li>
        <li>natraj</li>
    </ol>

    <h4>description list</h4>
    <!-- contains a pair of dt - description term and dd - description definition -->
     <dl>
        <dt>HTML</dt>
        <dd>structure of webpage</dd>

        <dt>CSS</dt>
        <dd>styles the website</dd>

        <dt>JAVA SCRIPT</dt>
        <dd>adding functionality to the website</dd>
     </dl>
</body>
</html>
