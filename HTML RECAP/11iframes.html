<!DOCTYPE html>
<html>
<head>
  <title>Iframe Example</title>
</head>

<body>

<h1>Iframe Demo</h1>
<!-- Heading displayed on the webpage -->

<iframe width="560" height="315" src="https://www.youtube.com/embed/fdTzP8Lqmd4?si=hyo_o13S-8_bv7db" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
<!-- 
iframe tag is used to embed another webpage inside this page

src     → URL of the page to be embedded
width   → Width of the iframe
height  → Height of the iframe
title   → Accessibility purpose (important)
-->

</body>
</html>
